<div class="rack-section-container">
    <div class="left-rack-container">
        <div class="rack">
            <app-rack [products]="section.leftRack" [rackSide]="'left'" [theme]="'minimalist'"></app-rack>
        </div>
    </div>
    <div class="cart-placeholder"></div>
    <div class="right-rack-container">
        <div class="rack">
            <app-rack [products]="section.rightRack" [rackSide]="'right'" [theme]="'minimalist'"></app-rack>
        </div>
    </div>
</div>
