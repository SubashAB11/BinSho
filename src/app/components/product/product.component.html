@if((isCart || theme === 'minimalist') && product) {
<div [ngClass]="{'cart-image': isCart, 'minimalist-image': theme === 'minimalist'}"><img
        [src]="`assets/images/${product.image}`" [alt]="product.name" /></div>
}

@else if (product) {
<div class="product-card">
    <div class="product-price">₹{{ product.price }}</div>
    <div><img [src]="`assets/images/${product.image}`" [alt]="product.name" /></div>
    <div class="product-name">{{ product.name }}</div>
</div>
}
