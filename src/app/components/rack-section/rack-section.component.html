<div cdkDropListGroup>
    <div class="cart-app">
        <img src="assets/images/cart_img_minimalist.png" alt="cart-image">
        <app-cart [totalClass]="'minimalist-total'"></app-cart>
    </div>
    @for (section of rackSections; track section) {

    @if(section.theme === 'two-d') {
    <app-two-d-section [section]="section"></app-two-d-section>
    } @else if (section.theme === 'minimalist') {
    <app-minimalist-section [section]="section"></app-minimalist-section>
    }
    
    }
</div>
