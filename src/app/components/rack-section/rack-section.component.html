<div cdkDropListGroup>

    @for (section of rackSections; track section) {
        
        @if(section.theme === Themes.TWO_D) {
            <app-two-d-section [section]="section"></app-two-d-section>
        } @else if (section.theme === Themes.MINIMALIST) {
            <app-minimalist-section [section]="section"></app-minimalist-section>
        } @else if (section.theme === Themes.CYBERPUNK) {
            <app-cyberpunk-section [section]="section"></app-cyberpunk-section>
        }
        
    }

    <div class="cart-app">
        <img src="assets/images/cart_img_cyberpunk.png" alt="cart-image">
        <app-cart [totalClass]="'cyberpunk-total'"></app-cart>
    </div>
</div>
