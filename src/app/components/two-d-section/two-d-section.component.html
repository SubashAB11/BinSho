<div class="rack-section-container">
    <div class="left-rack-container">
        <div class="rack-pillar">
            <div class="pillar"></div>
            <div class="pillar"></div>
        </div>
        <div class="rack">
            <app-rack [products]="section.leftRack" [rackSide]="'left'" [theme]="Themes.TWO_D"></app-rack>
        </div>
    </div>
    <div class="cart-placeholder"></div>
    <div class="right-rack-container">
        <div class="rack">
            <app-rack [products]="section.rightRack" [rackSide]="'right'" [theme]="Themes.TWO_D"></app-rack>
        </div>
        <div class="rack-pillar">
            <div class="pillar"></div>
            <div class="pillar"></div>
        </div>
    </div>
</div>
